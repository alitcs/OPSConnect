<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand mark (share/connect nodes) used as the browser-tab favicon and mobile
         home-screen/bookmark icon. Single scalable SVG keeps every size crisp. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1a6dff" />
    <!-- maximum-scale=1 stops iOS Safari from auto-zooming when a small-font input gains
         focus (the chat bar). iOS 10+ still allows manual pinch-zoom, so accessibility is kept. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="theme-color" content="#0f6cbd" />
    <meta
      name="description"
      content="ConnectOPS — a Microsoft Copilot-powered assistant that helps Ontario Public Service employees find the right people, skills, and teams in seconds."
    />
    <title>ConnectOPS — OPS People &amp; Knowledge Finder</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
